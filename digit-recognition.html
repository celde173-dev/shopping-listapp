<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손글씨 숫자 인식</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #64748b;
      font-size: 14px;
    }

    /* Loading Phase */
    #loadPhase {
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .load-icon {
      font-size: 72px;
      margin-bottom: 24px;
      display: block;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.85; }
    }

    .progress-container {
      background: #1e293b;
      border-radius: 12px;
      height: 10px;
      overflow: hidden;
      margin: 24px 0 12px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #818cf8, #a78bfa);
      border-radius: 12px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .status-text  { color: #94a3b8; font-size: 14px; min-height: 20px; }
    .accuracy-text { color: #818cf8; font-size: 20px; font-weight: 700; margin-top: 12px; min-height: 28px; }

    .error-box {
      background: #1e293b;
      border: 1px solid #ef4444;
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
      font-size: 13px;
      color: #fca5a5;
      line-height: 1.7;
      text-align: left;
    }

    /* Recognition Phase */
    #recogPhase {
      display: none;
      width: 100%;
      max-width: 780px;
    }

    .recog-layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .canvas-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #drawCanvas {
      border-radius: 16px;
      background: #fff;
      cursor: crosshair;
      touch-action: none;
      box-shadow: 0 0 0 4px #818cf8, 0 8px 32px rgba(129, 140, 248, 0.25);
      display: block;
    }

    .canvas-hint { color: #64748b; font-size: 13px; }

    .btn {
      padding: 10px 28px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary { background: #818cf8; color: #fff; }
    .btn-primary:hover { background: #6366f1; transform: translateY(-1px); }

    /* Results */
    .results-section { flex: 1; min-width: 260px; }

    .big-result {
      text-align: center;
      background: #1e293b;
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 24px;
    }

    .pred-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .pred-digit {
      font-size: 108px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pred-conf { font-size: 14px; color: #64748b; margin-top: 8px; }

    .bars-title {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .confidence-bars { display: flex; flex-direction: column; gap: 7px; }

    .bar-row { display: flex; align-items: center; gap: 10px; }

    .bar-label {
      width: 18px;
      font-size: 13px;
      font-weight: 700;
      color: #64748b;
      text-align: center;
      transition: color 0.3s;
    }
    .bar-label.top { color: #a78bfa; }

    .bar-track { flex: 1; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }

    .bar-fill {
      height: 100%;
      background: #334155;
      border-radius: 4px;
      transition: width 0.35s ease, background 0.3s ease;
      width: 0%;
    }
    .bar-fill.top { background: linear-gradient(90deg, #818cf8, #a78bfa); }

    .bar-pct { width: 44px; font-size: 12px; color: #64748b; text-align: right; transition: color 0.3s; }
    .bar-pct.top { color: #a78bfa; }

    .model-info {
      text-align: center;
      color: #334155;
      font-size: 12px;
      margin-top: 32px;
    }

    @media (max-width: 600px) {
      .recog-layout { flex-direction: column; align-items: center; }
      #drawCanvas { width: 240px !important; height: 240px !important; }
      .pred-digit { font-size: 80px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>손글씨 숫자 인식</h1>
    <p class="subtitle">MNIST로 학습된 신경망이 0~9를 실시간으로 인식합니다</p>
  </div>

  <!-- Loading Phase -->
  <div id="loadPhase">
    <span class="load-icon">🧠</span>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <p class="status-text"  id="statusText">모델 로딩 중...</p>
    <p class="accuracy-text" id="accuracyText"></p>
  </div>

  <!-- Recognition Phase -->
  <div id="recogPhase">
    <div class="recog-layout">
      <div class="canvas-section">
        <canvas id="drawCanvas" width="280" height="280"></canvas>
        <p class="canvas-hint">숫자를 크게 그려주세요</p>
        <button class="btn btn-primary" id="clearBtn">지우기</button>
      </div>
      <div class="results-section">
        <div class="big-result">
          <div class="pred-label">예측 결과</div>
          <div class="pred-digit" id="predDigit">?</div>
          <div class="pred-conf"  id="predConf">그림을 그려주세요</div>
        </div>
        <div class="bars-title">각 숫자별 확률</div>
        <div class="confidence-bars" id="confBars"></div>
      </div>
    </div>
    <p class="model-info">
      MLP (784→256→10) · MNIST 10,000개 학습 · 정확도 <span id="finalAcc">-</span>
    </p>
  </div>

  <script>
    /* ===== UI 참조 ===== */
    const $progress = document.getElementById('progressBar');
    const $status   = document.getElementById('statusText');
    const $accuracy = document.getElementById('accuracyText');
    const $digit    = document.getElementById('predDigit');
    const $conf     = document.getElementById('predConf');
    const $finalAcc = document.getElementById('finalAcc');

    const setProgress = p => { $progress.style.width = p + '%'; };
    const setStatus   = m => { $status.textContent = m; };

    /* ===== 신뢰도 바 생성 ===== */
    const bars = [];
    const barsEl = document.getElementById('confBars');
    for (let i = 0; i < 10; i++) {
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML =
        `<span class="bar-label" id="lbl${i}">${i}</span>` +
        `<div class="bar-track"><div class="bar-fill" id="fill${i}"></div></div>` +
        `<span class="bar-pct" id="pct${i}">0%</span>`;
      barsEl.appendChild(row);
      bars.push({
        lbl:  document.getElementById(`lbl${i}`),
        fill: document.getElementById(`fill${i}`),
        pct:  document.getElementById(`pct${i}`),
      });
    }

    /* ===== 모델 로딩 (순수 JS 추론) ===== */
    let W1, b1, W2, b2;

    function decodeF32(b64, rows, cols) {
      const raw  = atob(b64);
      const flat = new Float32Array(raw.length / 4);
      const dv   = new DataView(new ArrayBuffer(raw.length));
      for (let i = 0; i < raw.length; i++) dv.setUint8(i, raw.charCodeAt(i));
      for (let i = 0; i < flat.length; i++) flat[i] = dv.getFloat32(i * 4, true);
      return flat; // row-major
    }

    async function loadModel() {
      setStatus('모델 가중치 로딩 중...');
      setProgress(10);
      const resp = await fetch('model_weights.json');
      if (!resp.ok) throw new Error(`model_weights.json 로딩 실패 (HTTP ${resp.status})`);
      const d = await resp.json();

      setProgress(70);
      setStatus('가중치 디코딩 중...');

      W1 = decodeF32(d.W1); // (784 × 256) row-major
      b1 = decodeF32(d.b1); // (256)
      W2 = decodeF32(d.W2); // (256 × 10)  row-major
      b2 = decodeF32(d.b2); // (10)

      setProgress(100);
      return d.accuracy;
    }

    /* ===== 순방향 계산 ===== */
    function matVec(W, x, rows, cols) {
      // W shape: (cols, rows) stored col-major? No — (rows, cols) row-major
      // output[i] = sum_j W[i*cols + j] * x[j]   for i in range(rows)
      // BUT numpy saves (784,256): W[i*256 + j]  → output[j] = sum_i W[i*256+j]*x[i]
      // which is X @ W → y[j] = sum_i x[i]*W[i,j] = sum_i x[i]*W[i*cols+j]
      const out = new Float32Array(cols);
      for (let j = 0; j < cols; j++) {
        let s = 0;
        for (let i = 0; i < rows; i++) s += x[i] * W[i * cols + j];
        out[j] = s;
      }
      return out;
    }

    function addBias(a, b) { return a.map((v, i) => v + b[i]); }
    function relu(a)       { return a.map(v => v > 0 ? v : 0); }

    function softmax(a) {
      const max = Math.max(...a);
      const e   = a.map(v => Math.exp(v - max));
      const sum = e.reduce((s, v) => s + v, 0);
      return e.map(v => v / sum);
    }

    function forward(pixels) {
      const z1 = addBias(matVec(W1, pixels, 784, 256), b1);
      const a1 = relu(z1);
      const z2 = addBias(matVec(W2, a1, 256, 10), b2);
      return softmax(z2);
    }

    /* ===== 전처리 ===== */
    function preprocessCanvas(canvas) {
      const ctx     = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pix = imgData.data;

      // 경계 박스 탐색
      let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0, found = false;
      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const i = (y * canvas.width + x) * 4;
          if (pix[i] < 230 || pix[i+1] < 230 || pix[i+2] < 230) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
            found = true;
          }
        }
      }

      if (!found) return null;

      // 여백 추가 + 28×28 축소
      const pad = 20;
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(canvas.width  - 1, maxX + pad);
      maxY = Math.min(canvas.height - 1, maxY + pad);

      const tmp = document.createElement('canvas');
      tmp.width = 28; tmp.height = 28;
      const tCtx = tmp.getContext('2d');
      tCtx.fillStyle = '#fff';
      tCtx.fillRect(0, 0, 28, 28);
      tCtx.drawImage(canvas, minX, minY, maxX - minX, maxY - minY, 0, 0, 28, 28);

      const out = new Float32Array(784);
      const td  = tCtx.getImageData(0, 0, 28, 28).data;
      for (let i = 0; i < 784; i++) {
        // 색 반전: 흰 배경→0, 검정 글씨→1  (MNIST 형식)
        out[i] = 1 - td[i * 4] / 255;
      }
      return out;
    }

    /* ===== 예측 실행 ===== */
    function runPrediction() {
      const canvas = document.getElementById('drawCanvas');
      const pixels = preprocessCanvas(canvas);
      if (!pixels) return;

      const probs  = forward(pixels);
      const topIdx = probs.indexOf(Math.max(...probs));

      $digit.textContent = topIdx;
      $conf.textContent  = `신뢰도: ${(probs[topIdx] * 100).toFixed(1)}%`;

      for (let i = 0; i < 10; i++) {
        const isTop = i === topIdx;
        const p = (probs[i] * 100).toFixed(1);
        bars[i].lbl.className  = 'bar-label' + (isTop ? ' top' : '');
        bars[i].fill.className = 'bar-fill'  + (isTop ? ' top' : '');
        bars[i].pct.className  = 'bar-pct'   + (isTop ? ' top' : '');
        bars[i].fill.style.width = p + '%';
        bars[i].pct.textContent  = p + '%';
      }
    }

    /* ===== 캔버스 설정 ===== */
    function setupCanvas() {
      const canvas = document.getElementById('drawCanvas');
      const ctx    = canvas.getContext('2d');

      ctx.fillStyle   = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth   = 18;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.strokeStyle = '#111';

      let drawing = false, lastX = 0, lastY = 0, timer = null;

      function pos(e) {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width  / r.width;
        const sy = canvas.height / r.height;
        const s  = e.touches ? e.touches[0] : e;
        return { x: (s.clientX - r.left) * sx, y: (s.clientY - r.top) * sy };
      }

      function onStart(e) {
        e.preventDefault();
        drawing = true;
        const { x, y } = pos(e);
        lastX = x; lastY = y;
        ctx.beginPath();
        ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
        ctx.fillStyle = '#111';
        ctx.fill();
      }

      function onMove(e) {
        if (!drawing) return;
        e.preventDefault();
        const { x, y } = pos(e);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        lastX = x; lastY = y;
      }

      function onEnd() {
        if (!drawing) return;
        drawing = false;
        clearTimeout(timer);
        timer = setTimeout(runPrediction, 150);
      }

      canvas.addEventListener('mousedown',  onStart);
      canvas.addEventListener('mousemove',  onMove);
      canvas.addEventListener('mouseup',    onEnd);
      canvas.addEventListener('mouseleave', onEnd);
      canvas.addEventListener('touchstart', onStart, { passive: false });
      canvas.addEventListener('touchmove',  onMove,  { passive: false });
      canvas.addEventListener('touchend',   onEnd);

      document.getElementById('clearBtn').addEventListener('click', () => {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        $digit.textContent = '?';
        $conf.textContent  = '그림을 그려주세요';
        bars.forEach(b => {
          b.lbl.className  = 'bar-label';
          b.fill.className = 'bar-fill';
          b.pct.className  = 'bar-pct';
          b.fill.style.width = '0%';
          b.pct.textContent  = '0%';
        });
      });
    }

    /* ===== 시작 ===== */
    async function main() {
      try {
        const acc = await loadModel();
        setStatus('준비 완료!');
        document.getElementById('accuracyText').textContent = `정확도: ${acc}%`;
        await new Promise(r => setTimeout(r, 700));

        document.getElementById('loadPhase').style.display  = 'none';
        document.getElementById('recogPhase').style.display = 'block';
        $finalAcc.textContent = acc + '%';
        setupCanvas();
      } catch (err) {
        setStatus('오류 발생');
        const box = document.createElement('div');
        box.className = 'error-box';
        box.innerHTML = `<strong>오류:</strong> ${err.message}<br><br>페이지를 새로고침해 주세요.`;
        document.getElementById('loadPhase').appendChild(box);
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
