<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 28px 24px 20px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 13px;
      opacity: 0.75;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .stats {
      padding: 12px 24px;
      font-size: 13px;
      color: #94a3b8;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #ef4444;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fee2e2;
    }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .empty-state {
      text-align: center;
      color: #cbd5e1;
      padding: 40px 24px;
      font-size: 14px;
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .list-item {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      gap: 12px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .list-item:hover {
      background: #f8fafc;
    }

    /* 접근성: 실제 checkbox는 숨기고 커스텀 스타일 적용 */
    .list-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      background: #fff;
      position: relative;
    }

    .list-item input[type="checkbox"]:checked {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .list-item input[type="checkbox"]:checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: block;
      position: absolute;
    }

    .list-item input[type="checkbox"]:focus-visible {
      outline: 2px solid #4f46e5;
      outline-offset: 2px;
    }

    .list-item.checked .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #1e293b;
      word-break: break-all;
      cursor: pointer;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    .delete-btn:focus-visible {
      outline: 2px solid #ef4444;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>쇼핑 리스트</h1>
      <p class="subtitle">오늘 사야 할 것들을 기록하세요</p>
    </div>

    <div class="input-area">
      <input id="itemInput" type="text" placeholder="아이템 입력..." aria-label="아이템 입력" />
      <button id="addBtn">추가</button>
    </div>

    <div class="stats">
      <span id="statsText">항목 없음</span>
      <button class="clear-btn" id="clearBtn">완료 항목 삭제</button>
    </div>

    <ul class="list" id="list" aria-label="쇼핑 리스트">
      <li class="empty-state" id="emptyState">
        <div class="icon">🛒</div>
        <div>아이템을 추가해 보세요</div>
      </li>
    </ul>
  </div>

  <script>
    let items = (() => {
      try {
        return JSON.parse(localStorage.getItem('shoppingList') || '[]');
      } catch {
        return [];
      }
    })();

    const input     = document.getElementById('itemInput');
    const addBtn    = document.getElementById('addBtn');
    const clearBtn  = document.getElementById('clearBtn');
    const list      = document.getElementById('list');
    const emptyState = document.getElementById('emptyState');
    const statsText = document.getElementById('statsText');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.isComposing) addItem();
    });
    addBtn.addEventListener('click', addItem);
    clearBtn.addEventListener('click', clearChecked);

    function save() {
      try {
        localStorage.setItem('shoppingList', JSON.stringify(items));
      } catch {
        // 시크릿 모드 또는 스토리지 용량 초과 시 무시
      }
    }

    function render() {
      list.querySelectorAll('.list-item').forEach(el => el.remove());

      if (items.length === 0) {
        emptyState.style.display = 'block';
        statsText.textContent = '항목 없음';
        return;
      }

      emptyState.style.display = 'none';
      const checkedCount = items.filter(i => i.checked).length;
      statsText.textContent = `전체 ${items.length}개 · 완료 ${checkedCount}개`;

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'list-item' + (item.checked ? ' checked' : '');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.setAttribute('aria-label', item.text);
        checkbox.addEventListener('change', () => toggleItem(idx));

        const text = document.createElement('span');
        text.className = 'item-text';
        text.textContent = item.text;
        text.addEventListener('click', () => toggleItem(idx));

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.setAttribute('aria-label', `${item.text} 삭제`);
        del.addEventListener('click', () => deleteItem(idx));

        li.appendChild(checkbox);
        li.appendChild(text);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      input.focus();
      save();
      render();
    }

    function toggleItem(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    render();
  </script>
</body>
</html>
